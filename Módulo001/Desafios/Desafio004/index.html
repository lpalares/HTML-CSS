<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../img/favicon.ico" type="image/x-icon">
    <title>Desafio dos Emojis</title>
</head>
<body>
    <h1>Como Colocar Emojis?</h1>
    <p>Antes de colocar o código do emoji, deve colocar &#x.</p>
    <h1>Exemplos de Emojis</h1>
    <h2>Carinhas</h2>
    <ul>
        <li>&#x1F913 1F913</li>
        <li>&#x1FAE9 1FAE9</li>
        <li>&#x1F979 1F979</li>
        <li>&#x1FAEA 1FAEA</li>
    </ul>
    <h2>Mãos</h2>
    <ul>
        <Li>&#x1F44B 1F44B</Li>
        <li>&#x1F919 1F919</li>
        <li>&#x270D &#xFE0F 270D / FE0F</li>
    </ul>
    <h2>Animais</h2>
    <ul>
        <li>&#x1F991 1F991 (Polvo)</li>
        <li>&#x1F419 1F419 (Lula)</li>
        <li>&#x1F985 1F985</li>
    </ul>
</body>
</html>
