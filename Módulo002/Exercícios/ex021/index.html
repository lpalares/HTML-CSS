<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../img/favicon.ico" type="image/x-icon">
    <title>Modelo de Caixas</title>
    <style>
        /*
        Estilos de bordas: solid (uma borda normal), dashed (pontilhado com linhas),
        dotted (pontilhado com pontos), double (linhas duplas), groove (3D)
        */

        h1 { /*box-level*/
            background-color: lightgray;
            height: 300px;
            width: 300px;
            /* border: width, style, color*/
            border: 10px, solid, darkslategray;
            /* padding: top, right, bottom, left */
            padding: 10px;
            /* margin: top, right, bottom, left (auto centraliza)*/
            margin: 20px auto 40px auto;
            /* outline: width style color */
            outline: 5px dashed salmon;
        }

        a {/*inline-level*/
            border-width: 10px;
            border-style: solid;
            border-color: red;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa Box-Level</h1>
    <p>Parágrafos também são exemplos de Box-Level, mas os <a href="#">links</a> são exemplos de caixas inline-level</p>
</body>
</html>
