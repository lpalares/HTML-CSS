<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../img/favicon.ico" type="image/x-icon">
    <title>Gradiente em CSS</title>
    <style>
        * { /* Configurações globais das CSS */
            height: 100%;
        }
        body {
            background-image: linear-gradient(to bottom, #4fffdc, #3fccb0);
            /* background-image: linear-gradient(to bottom/top/right/left/45deg, color, color)
            background-image: radial-gradient(circle, color, color)
            Pode usar porcentagem para decidir a quantidade que você quer que uma cor ocupe do degradê. */
            background-attachment: fixed; /* Define o comportamento de uma imagem de fundo. Por exemplo, faz uma imagem descer junto com a janela de visualização ou não. */
        }
    </style>
</head>
<body>
    <h1>Testando Gradientes</h1>
</body>
</html>
